<script>
window.speechState = window.speechState || {
    chunks: [],
    currentIndex: 0,
    isPlaying: false
};

document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('btn-read-post');
    if (!btn) return;

    const icon = document.getElementById('icon-read');
    const text = document.getElementById('text-read');
    const synth = window.speechSynthesis;

    btn.addEventListener('click', () => {

        if (synth.speaking && window.speechState.isPlaying) {
            window.speechState.isPlaying = false;
            synth.cancel(); 
            updateBtn("▷", "Reanudar");
            return;
        }

        if (!window.speechState.isPlaying) {
            if (window.speechState.chunks.length === 0) {
                const elements = document.querySelectorAll('article h1, article h2, article h3, article h4, article p, article li');
                elements.forEach(el => {
                    if (!el.closest('pre') && !el.closest('code') && !el.closest('.post-meta') && !el.closest('.post-tags')) {
                        let t = el.innerText.trim();
                        if (t.length > 3) {
                            const subs = t.split(/[.!?]\s/).filter(f => f.trim().length > 3);
                            window.speechState.chunks.push(...subs);
                        }
                    }
                });
            }

            readChunks(window.speechState.currentIndex);
        }
    });

    function readChunks(index) {
        if (index >= window.speechState.chunks.length) {
            finishReading();
            return;
        }

        window.speechState.isPlaying = true;
        window.speechState.currentIndex = index;
        
        const utterance = new SpeechSynthesisUtterance(window.speechState.chunks[index]);
        const voices = synth.getVoices();
        utterance.voice = voices.find(v => v.lang.includes('es')) || voices[0];
        utterance.lang = 'es-ES';
        utterance.rate = 1.1;

        utterance.onstart = () => updateBtn("⏸", "Pausar");

        utterance.onend = () => {
            if (window.speechState.isPlaying) {
                window.speechState.currentIndex++;
                readChunks(window.speechState.currentIndex);
            }
        };

        utterance.onerror = (e) => {
            if (e.error !== 'interrupted') {
                console.error("Error real SpeechSynthesis:", e.error);
            }
            if (window.speechState.isPlaying && e.error !== 'interrupted') {
                window.speechState.currentIndex++;
                readChunks(window.speechState.currentIndex);
            }
        };

        synth.speak(utterance);
    }

    function finishReading() {
        window.speechState.isPlaying = false;
        window.speechState.currentIndex = 0;
        window.speechState.chunks = [];
        updateBtn("▷", "Escuchar");
    }

    function updateBtn(ico, txt) {
        icon.innerText = ico;
        text.innerText = txt;
    }

    document.getElementById('challenge_validate').addEventListener('click', function() {
        let currentQuestion = 1;
        let score = 0;
        let totalQuestions = 0;
        let active = true;

        while (active) {
            const inputs = document.querySelectorAll(`input[name="challenge_${currentQuestion}"]`);

            if (inputs.length === 0) {
                active = false;
                break;
            }

            totalQuestions++;
            let answeredCorrectly = false;

            inputs.forEach(input => {
                const isCorrect = input.getAttribute('data-result') === "true";
                const parentElement = input.parentElement;

                parentElement.style.color = "";
                parentElement.style.fontWeight = "normal";

                if (isCorrect) {
                    parentElement.style.color = "#28a745";
                    parentElement.style.fontWeight = "bold";
                }

                if (input.checked && isCorrect) {
                    answeredCorrectly = true;
                } else if (input.checked && !isCorrect) {
                    parentElement.style.color = "#dc3545";
                    parentElement.style.fontWeight = "bold";
                }
            });

            if (answeredCorrectly) score++;
            currentQuestion++;
        }

        const resultDiv = document.getElementById('quiz-result');
        if (resultDiv) {
            const shareUrl = window.location.href.split(window.location.hash).join("");

            resultDiv.innerHTML = `
                <div style="padding: 15px; margin-top: 20px;">
                    <p><strong>Resultado:</strong> ${score} de ${totalQuestions}</p>
                    <hr style="margin: 8px; margin-left: 0px; margin-right:0px;">
                    <p>Ahora podés ir a tu IA de interés y pegar el siguiente contenido:</p>
                    <blockquote style="padding: 10px; font-style: italic;">
                        Podés leer el artículo de ${shareUrl} y en base al mismo generar preguntas 
                        variadas para explicarte lo que entendí y al responderte me las puedas validar y
                        dar feedback al respecto.
                    </blockquote>
                </div>
            `;
        }
    });

});
</script>
{{- /* Footer custom content area end */ -}}
